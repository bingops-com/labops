apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: private-dns-labtest
  namespace: argocd-system
  annotations:
    argocd.argoproj.io/sync-wave: "-7"
spec:
  project: labops-labtest
  source:
    repoURL: https://github.com/bingops-com/labops.git
    targetRevision: develop
    path: apps/platform/private-dns/labtest
  destination:
    server: https://kubernetes.default.svc
    namespace: private-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
