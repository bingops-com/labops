apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit-labtest
  namespace: argocd-system
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  project: labops-labtest
  source:
    repoURL: https://fluent.github.io/helm-charts
    chart: fluent-bit
    targetRevision: 0.57.9
    helm:
      releaseName: fluent-bit
      valuesObject:
        env:
          - name: FLUENT_ELASTIC_PASSWORD
            valueFrom:
              secretKeyRef:
                name: observability-elasticsearch-clients
                key: fluent-bit-password
        config:
          service: |
            [SERVICE]
                Flush         5
                Daemon        Off
                Log_Level     info
                Parsers_File  /fluent-bit/etc/parsers.conf
                Parsers_File  /fluent-bit/etc/conf/custom_parsers.conf
                HTTP_Server   On
                HTTP_Listen   0.0.0.0
                HTTP_Port     2020
                storage.path  /var/log/flb-storage/
          inputs: |
            [INPUT]
                Name              tail
                Path              /var/log/containers/*.log
                multiline.parser  docker, cri
                Tag               kube.*
                Mem_Buf_Limit     10MB
                Skip_Long_Lines   On
                storage.type      filesystem
          filters: |
            [FILTER]
                Name                kubernetes
                Match               kube.*
                Kube_URL            https://kubernetes.default.svc:443
                Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
                Kube_Tag_Prefix     kube.var.log.containers.
                Merge_Log           On
                Keep_Log            Off
                Labels              On
                Annotations         Off
          outputs: |
            [OUTPUT]
                Name                es
                Match               kube.*
                Host                observability-es-http.logging.svc
                Port                9200
                HTTP_User           fluent-bit
                HTTP_Passwd         ${FLUENT_ELASTIC_PASSWORD}
                Logstash_Format     On
                Logstash_Prefix     logs-labtest
                Generate_ID         On
                Suppress_Type_Name  On
                tls                 On
                tls.verify          Off
                Retry_Limit         False
        resources:
          requests:
            cpu: 30m
            memory: 48Mi
          limits:
            cpu: 150m
            memory: 128Mi
        tolerations:
          - operator: Exists
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
