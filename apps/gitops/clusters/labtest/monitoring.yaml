apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-labtest
  namespace: argocd-system
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: labops-labtest
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.19.0
    helm:
      releaseName: monitoring
      valuesObject:
        alertmanager:
          config:
            global:
              resolve_timeout: 5m
            inhibit_rules:
              - source_matchers:
                  - severity = critical
                target_matchers:
                  - severity =~ warning|info
                equal:
                  - namespace
                  - alertname
              - source_matchers:
                  - severity = warning
                target_matchers:
                  - severity = info
                equal:
                  - namespace
                  - alertname
            route:
              receiver: discord
              group_by:
                - namespace
                - alertname
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 6h
              routes:
                - receiver: "null"
                  matchers:
                    - alertname = Watchdog
            receivers:
              - name: "null"
              - name: discord
                discord_configs:
                  - webhook_url_file: /etc/alertmanager/secrets/observability-discord/url
                    send_resolved: true
                    username: LabOps labtest
          alertmanagerSpec:
            secrets:
              - observability-discord
            resources:
              requests:
                cpu: 20m
                memory: 48Mi
              limits:
                cpu: 100m
                memory: 128Mi
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 512Mi
        grafana:
          admin:
            existingSecret: observability-grafana
            userKey: admin-user
            passwordKey: admin-password
          envValueFrom:
            ELASTICSEARCH_PASSWORD:
              secretKeyRef:
                name: observability-grafana
                key: elasticsearch-password
          additionalDataSources:
            - name: Elasticsearch
              uid: elasticsearch
              type: elasticsearch
              access: proxy
              url: https://observability-es-http.logging.svc:9200
              basicAuth: true
              basicAuthUser: grafana
              jsonData:
                database: logs-labtest-*
                index: logs-labtest-*
                interval: Daily
                timeField: "@timestamp"
                tlsSkipVerify: true
              secureJsonData:
                basicAuthPassword: $ELASTICSEARCH_PASSWORD
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-cloudflare
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.middlewares: monitoring-grafana-allowlist@kubernetescrd
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - grafana.test.lab.bingo
            tls:
              - secretName: grafana-ingress-tls
                hosts:
                  - grafana.test.lab.bingo
          persistence:
            enabled: true
            storageClassName: local-path
            accessModes:
              - ReadWriteOnce
            size: 1Gi
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
        prometheus:
          prometheusSpec:
            externalLabels:
              cluster: labtest
              environment: test
            retention: 2d
            retentionSize: 1500MB
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 768Mi
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 2Gi
        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 192Mi
        kube-state-metrics:
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 96Mi
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 20m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 64Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
