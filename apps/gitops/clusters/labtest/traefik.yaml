apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-labtest
  namespace: argocd-system
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: labops-labtest
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 40.2.0
    helm:
      valuesObject:
        ingressClass:
          enabled: true
          isDefaultClass: true
          name: traefik
        deployment:
          kind: DaemonSet
          dnsPolicy: ClusterFirstWithHostNet
        hostNetwork: true
        podSecurityContext:
          runAsGroup: 0
          runAsNonRoot: false
          runAsUser: 0
          seccompProfile:
            type: RuntimeDefault
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            add:
              - NET_BIND_SERVICE
            drop:
              - ALL
        updateStrategy:
          rollingUpdate:
            maxUnavailable: 1
            maxSurge: 0
        service:
          type: ClusterIP
        ports:
          web:
            port: 80
            hostPort: 80
            http:
              redirections:
                entryPoint:
                  to: websecure
                  scheme: https
          websecure:
            port: 443
            hostPort: 443
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: baseline
        pod-security.kubernetes.io/warn: restricted
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
