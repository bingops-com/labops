apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: labops-preprod
  namespace: argocd-system
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/bingops-com/labops.git
    targetRevision: main
    path: apps/gitops/clusters/preprod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
