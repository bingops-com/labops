apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

labels:
  - pairs:
      environment: labprod

images:
  - name: ghcr.io/bingops-com/www
    newTag: sha-b3bf9ed

patches:
  - target:
      group: traefik.io
      version: v1alpha1
      kind: Middleware
      name: portfolio-allowlist
    patch: |-
      $patch: delete
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: portfolio-allowlist
  - target:
      kind: Ingress
      name: portfolio
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: portfolio.bingops.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: portfolio.bingops.com
      - op: remove
        path: /metadata/annotations/traefik.ingress.kubernetes.io~1router.middlewares
