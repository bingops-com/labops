apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

labels:
  - pairs:
      environment: labtest

images:
  - name: ghcr.io/bingops-com/www
    newTag: latest

patches:
  - target:
      kind: Ingress
      name: portfolio
    patch: |-
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-cloudflare
      - op: replace
        path: /spec/rules/0/host
        value: portfolio.test.lab.bingo
      - op: replace
        path: /spec/tls/0/hosts/0
        value: portfolio.test.lab.bingo
