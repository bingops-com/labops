apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: labtest-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: labtest local root CA
  secretName: labtest-root-ca
  duration: 87600h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: labtest-selfsigned-bootstrap
    kind: ClusterIssuer
