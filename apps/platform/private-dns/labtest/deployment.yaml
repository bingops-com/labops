apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns-private
  namespace: private-dns
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: coredns-private
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coredns-private
    spec:
      hostNetwork: true
      dnsPolicy: Default
      containers:
        - name: coredns
          image: registry.k8s.io/coredns/coredns:v1.13.1
          args:
            - -conf
            - /etc/coredns/Corefile
          ports:
            - name: dns-udp
              containerPort: 53
              hostIP: 192.168.10.170
              hostPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              hostIP: 192.168.10.170
              hostPort: 53
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: coredns-private
