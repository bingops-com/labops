apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-private
  namespace: private-dns
data:
  Corefile: |
    argocd.bingops.com:53 {
        errors
        log
        template IN A {
            match ^argocd[.]bingops[.]com[.]$
            answer "{{ .Name }} 30 IN A 192.168.1.151"
        }
        cache 30
    }
