apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-validation
  namespace: postgresql
spec:
  instances: 1
  bootstrap:
    initdb:
      database: validation
      owner: cnpg_validation
      secret:
        name: cnpg-validation-credentials
      dataChecksums: true
  storage:
    size: 4Gi
    storageClass: local-path
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: cnpg-validation
