apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-labprod-postgresql
  namespace: authentik
spec:
  instances: 1
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-cnpg-credentials
      dataChecksums: true
  storage:
    size: 8Gi
    storageClass: local-path
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: authentik-labprod-postgresql
