apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: authentik-labprod-postgresql-daily
  namespace: authentik
spec:
  schedule: "0 0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: authentik-labprod-postgresql
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
