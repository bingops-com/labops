---
- name: Reload Proxmox networking
  ansible.builtin.command: ifreload -a
  changed_when: true
  when: not ansible_check_mode

- name: Reload kernel parameters
  ansible.builtin.command: sysctl --system
  changed_when: true
  when: not ansible_check_mode

- name: Reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: not ansible_check_mode

- name: Restart Kubernetes VLAN routing
  ansible.builtin.systemd_service:
    name: labops-kubernetes-vlan.service
    state: restarted
  when: not ansible_check_mode
