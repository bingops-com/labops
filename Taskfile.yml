version: "3"

vars:
  ANSIBLE_INVENTORY: ansible/inventories/main/hosts
  PROXMOX_PLAYBOOK: ansible/proxmox-router.yml
  NETWORK_TERRAFORM_DIR: terraform/network
  PROXMOX_TERRAFORM_DIR: terraform/proxmox
  ALLOW_MISSING_MANAGEMENT: "false"

tasks:
  default:
    desc: List available LabOps tasks
    cmds:
      - task --list
    silent: true

  proxmox:ping:
    desc: Test Ansible access to the Proxmox host
    cmds:
      - ansible -i {{.ANSIBLE_INVENTORY}} proxmox -m ping

  proxmox:vlan:check:
    desc: Preview the Proxmox VLAN 10 router configuration
    cmds:
      - ansible-playbook -i {{.ANSIBLE_INVENTORY}} {{.PROXMOX_PLAYBOOK}} --check --diff

  proxmox:vlan:apply:
    desc: Configure VLAN 10 routing and NAT on Proxmox
    prompt: This will change networking, sysctl and nftables on Proxmox 192.168.1.100. Continue?
    cmds:
      - ansible-playbook -i {{.ANSIBLE_INVENTORY}} {{.PROXMOX_PLAYBOOK}} --diff

  proxmox:template:verify:
    desc: Verify that template 1234 remains bootable when CAPMOX adds NoCloud
    cmds:
      - ansible-playbook -i {{.ANSIBLE_INVENTORY}} ansible/proxmox-template-verify.yml

  workstation:route:
    desc: Wait for the labmgmt Talos API through the Kubernetes VLAN
    cmds:
      - |
        set -eu
        timeout_seconds=600
        retry_seconds=10
        deadline=$(( $(date +%s) + timeout_seconds ))

        echo "Waiting up to ${timeout_seconds}s for the labmgmt Talos API through Tailscale..."
        while ! nc -z -w 5 192.168.10.150 50000 >/dev/null 2>&1; do
          if [ "$(date +%s)" -ge "${deadline}" ]; then
            echo "labmgmt Talos API 192.168.10.150:50000 is still unreachable after ${timeout_seconds}s." >&2
            echo "Check VM 150 power, console, ide2 Talos ISO, sata0 NoCloud seed, VLAN tag 10, and the Tailscale route." >&2
            exit 1
          fi

          echo "labmgmt Talos API is not ready; retrying in ${retry_seconds}s..."
          sleep "${retry_seconds}"
        done

        echo "labmgmt Talos API is ready."

  network:init:
    desc: Initialize the persistent network Terraform stack
    cmds:
      - terraform -chdir={{.NETWORK_TERRAFORM_DIR}} init

  network:plan:
    desc: Build and save the Proxmox VLAN and Tailscale network plan
    prompt: This reads live Tailscale state and plans Proxmox host networking. Continue?
    cmds:
      - task: network:init
      - terraform -chdir={{.NETWORK_TERRAFORM_DIR}} plan -out=network.tfplan

  network:apply:
    desc: Apply the reviewed persistent network plan
    prompt: This configures the Proxmox VLAN router and enables Tailscale subnet routes. Continue?
    preconditions:
      - sh: test -f {{.NETWORK_TERRAFORM_DIR}}/network.tfplan
        msg: Run task network:plan and review the saved plan first.
    cmds:
      - terraform -chdir={{.NETWORK_TERRAFORM_DIR}} apply network.tfplan

  terraform:fmt:
    desc: Check formatting of the Proxmox Terraform stack
    cmds:
      - terraform fmt -check terraform/proxmox/*.tf terraform/proxmox/terraform.tfvars

  terraform:validate:
    desc: Validate the initialized Proxmox Terraform stack offline
    cmds:
      - terraform -chdir={{.PROXMOX_TERRAFORM_DIR}} validate

  terraform:plan:
    desc: Build and save the Proxmox Terraform plan
    prompt: This reads live Proxmox state and may expose sensitive plan output. Continue?
    cmds:
      - terraform -chdir={{.PROXMOX_TERRAFORM_DIR}} plan -out=vlan10.tfplan

  terraform:apply:
    desc: Apply the previously reviewed Proxmox Terraform plan
    prompt: This will apply terraform/proxmox/vlan10.tfplan to Proxmox. Continue?
    preconditions:
      - sh: test -f {{.PROXMOX_TERRAFORM_DIR}}/vlan10.tfplan
        msg: Run task terraform:plan and review the saved plan first.
      - sh: nc -z -w 5 192.168.10.1 22
        msg: The Proxmox VLAN gateway SSH endpoint is unreachable. Run task network:plan and task network:apply first.
    cmds:
      - terraform -chdir={{.PROXMOX_TERRAFORM_DIR}} apply vlan10.tfplan

  terraform:destroy:plan:
    desc: Build and save a destruction plan for the Proxmox Terraform stack
    prompt: This plans destruction of labmgmt, VM 150, template 1234, and Terraform-managed Talos assets. Continue?
    cmds:
      - terraform -chdir={{.PROXMOX_TERRAFORM_DIR}} plan -destroy -out=destroy.tfplan

  terraform:destroy:apply:
    desc: Apply the previously reviewed Proxmox destruction plan
    prompt: This will permanently apply terraform/proxmox/destroy.tfplan. Continue?
    preconditions:
      - sh: test -f {{.PROXMOX_TERRAFORM_DIR}}/destroy.tfplan
        msg: Run task terraform:destroy:plan and review the saved plan first.
    cmds:
      - terraform -chdir={{.PROXMOX_TERRAFORM_DIR}} apply destroy.tfplan

  clients:management:
    desc: Install the Terraform-managed labmgmt kubeconfig and talosconfig
    cmds:
      - ./hacks/cluster-setup.sh --management-only
      - kubectl config use-context labmgmt

  capi:init:
    desc: Install or update the pinned CAPI providers on labmgmt
    prompt: This will install or update CAPI providers on the labmgmt context. Continue?
    preconditions:
      - sh: test "$(kubectl config current-context 2>/dev/null)" = labmgmt
        msg: Run task clients:management first; the current context must be labmgmt.
      - sh: test -f capi/credentials.env
        msg: Create capi/credentials.env from the tracked example first.
    cmds:
      - ./hacks/capi-init.sh --yes

  capi:workloads:delete:
    desc: Delete only the CAPI-owned labprod and labtest clusters
    prompt: This permanently deletes CAPI clusters labprod and labtest and their VMs 151 and 152. Continue?
    preconditions:
      - sh: test "$(kubectl config current-context 2>/dev/null)" = labmgmt || { test "{{.ALLOW_MISSING_MANAGEMENT}}" = "true" && test -z "$(kubectl config current-context 2>/dev/null)"; }
        msg: Refusing deletion because the current kubectl context is neither labmgmt nor empty in bootstrap mode.
    cmds:
      - |
        set -eu
        if ! kubectl get --raw=/version >/dev/null; then
          if [ "{{.ALLOW_MISSING_MANAGEMENT}}" = "true" ]; then
            echo "Management cluster is unavailable; assuming no CAPI workload clusters exist."
            echo "Skipping deletion and continuing with the creation workflow."
            exit 0
          fi

          echo "Management cluster is unavailable; refusing to skip deletion in strict mode." >&2
          exit 1
        fi

        cluster_crd="$(kubectl get crd clusters.cluster.x-k8s.io --ignore-not-found -o name)"
        if [ -z "${cluster_crd}" ]; then
          echo "CAPI Cluster CRD is not installed; no workload clusters to delete."
          exit 0
        fi

        for workload_cluster in labprod labtest; do
          cluster_resource="$(kubectl get cluster "${workload_cluster}" --namespace capi-workloads --ignore-not-found -o name)"
          if [ -z "${cluster_resource}" ]; then
            echo "CAPI cluster ${workload_cluster} does not exist; skipping deletion."
            continue
          fi

          kubectl delete "${cluster_resource}" --namespace capi-workloads --wait=true --timeout=20m
        done

  capi:workloads:apply:
    desc: Create labprod and labtest from the tracked CAPI manifests
    prompt: This will create CAPI clusters labprod and labtest on Proxmox. Continue?
    preconditions:
      - sh: test "$(kubectl config current-context 2>/dev/null)" = labmgmt
        msg: Refusing creation because the current kubectl context is not labmgmt.
    cmds:
      - kubectl apply -f capi/namespace.yaml
      - kubectl apply -f capi/clusters/labprod.yaml
      - kubectl apply -f capi/clusters/labtest.yaml

  capi:workloads:wait:
    desc: Wait for both CAPI workload clusters to become available
    cmds:
      - kubectl wait --for=condition=Available cluster/labprod cluster/labtest --namespace capi-workloads --timeout=30m

  clients:workloads:
    desc: Install kubeconfig and talosconfig for labprod and labtest
    cmds:
      - ./hacks/cluster-setup.sh --workload labprod --workload labtest

  lifecycle:create:
    desc: Run the complete creation cycle through labprod and labtest
    summary: |
      Configures the Proxmox VLAN router, verifies Tailscale, reconciles labmgmt,
      installs CAPI, creates labprod and labtest, waits for readiness, and installs
      all client configurations. Existing workload clusters are not deleted.
    prompt: This will configure live Proxmox and create or update all three Kubernetes clusters. Continue?
    cmds:
      - task: setup:vlan
      - task: clients:management
      - task: capi:init
      - task: capi:workloads:apply
      - task: capi:workloads:wait
      - task: clients:workloads

  lifecycle:recreate:
    desc: Recreate all three clusters, VM 150, template 1234, and workload VMs
    summary: |
      Deletes the CAPI-owned labprod and labtest clusters first, while labmgmt
      is available, then destroys the Terraform-owned labmgmt VM 150, template
      1234 and Talos assets before recreating all three clusters. Persistent
      network/Tailscale configuration and ignored credential files are kept.
    prompt: This permanently recreates labprod, labtest, labmgmt, VMs 150-152, and template 1234. Continue?
    preconditions:
      - sh: test -z "$(kubectl config current-context 2>/dev/null)" || test "$(kubectl config current-context 2>/dev/null)" = labmgmt
        msg: Refusing recreation because kubectl currently targets a cluster other than labmgmt.
    cmds:
      - task: capi:workloads:delete
        vars:
          ALLOW_MISSING_MANAGEMENT: "true"
      - task: terraform:destroy:plan
      - task: terraform:destroy:apply
      - task: lifecycle:create

  lifecycle:destroy:
    desc: Safely destroy labprod, labtest, then the Terraform-managed labmgmt stack
    summary: |
      Deletes labprod and labtest through CAPI and waits for cleanup before
      creating and applying a reviewed Terraform destruction plan for labmgmt.
      The Terraform stack also owns VM 150, template 1234, its ISO and Talos assets.
      Proxmox VLAN 10 routing and Tailscale advertisement remain configured.
    prompt: This permanently destroys labprod, labtest, labmgmt, VM 150, and template 1234. Continue?
    preconditions:
      - sh: test "{{.CONFIRM_DESTROY}}" = "labprod,labtest,labmgmt"
        msg: Run with CONFIRM_DESTROY=labprod,labtest,labmgmt to name the exact targets.
      - sh: test "$(kubectl config current-context 2>/dev/null)" = labmgmt
        msg: Refusing destruction because the current kubectl context is not labmgmt.
    cmds:
      - task: capi:workloads:delete
      - task: terraform:destroy:plan
      - task: terraform:destroy:apply

  setup:vlan:
    desc: Apply the network stack, then plan and apply labmgmt
    summary: |
      End-to-end VLAN 10 setup for Proxmox and the Terraform-managed labmgmt VM.
      This does not delete or recreate CAPI workload clusters.
    prompt: This will apply the network and labmgmt Terraform stacks. Continue?
    cmds:
      - task: network:plan
      - task: network:apply
      - task: terraform:plan
      - task: terraform:apply
      - task: proxmox:template:verify
      - task: workstation:route
